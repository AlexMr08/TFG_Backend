services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-windows
    restart: unless-stopped
    # En Windows con WSL2, esto suele bastar para mapear la GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8002:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    command: >
      Qwen/Qwen3-VL-8B-Instruct-FP8
      --gpu-memory-utilization 0.85
      --max-model-len 6144
      --safetensors-load-strategy prefetch
      --kv-cache-dtype fp8
      --limit-mm-per-prompt.video=0
      --max-num-seqs 4
      --quantization fp8
      --enforce-eager
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_TOKEN=${HF_TOKEN}

  db:
    platform: linux/amd64
    image: postgres:18
    container_name: postgres-tfg
    restart: always
    environment:
      # Sincronizado con tu DATABASE_URL actual
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tfg}
    command: ["postgres", "-c", "max_connections=300"]
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chromadb
    restart: always
    ports:
      - "8004:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build: .
    container_name: tfg-backend
    restart: unless-stopped
    depends_on:
      - db
      - chromadb
      - vllm
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CARPETA_IMAGENES=/data/wikiart
    volumes:
      - ./:/app
      - D:\wikiart:/data/wikiart
    working_dir: /app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4", "--timeout-keep-alive", "300"]

  ingest:
    build: .
    container_name: tfg-ingest
    depends_on:
      - db
      - chromadb
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tfg}
      - CHROMA_USE_HTTP=true
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_SSL=false
      - CHROMA_COLLECTION=wikiart
      - CARPETA_IMAGENES=/data/wikiart
    volumes:
      - ./:/app
      - D:\wikiart:/data/wikiart
      - ./arte_db:/app/arte_db
    working_dir: /app
    command:
      [
        "/bin/sh",
        "-c",
        "until python -c \"import socket,sys; s=socket.socket(); sys.exit(0 if s.connect_ex(('db', 5432)) == 0 else 1)\"; do echo 'waiting for db'; sleep 1; done && python ingestSQL.py",
      ]

  vllm_bench:
    image: vllm/vllm-openai:latest
    container_name: vllm-bench
    depends_on:
      - vllm
    profiles:
      - bench
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-lc"]
    command:
    - "pip install --no-cache-dir 'vllm[bench]' 'datasets' && until curl -s http://vllm:8000/v1/models > /dev/null; do echo 'Esperando a que vLLM inicie...'; sleep 5; done && vllm bench serve --backend openai-chat --endpoint /v1/chat/completions --model Qwen/Qwen3-VL-8B-Instruct-FP8 --dataset-name random-mm --host vllm --port 8000 --request-rate 2.0 --num-prompts 50 | tee /app/benchmark_results.txt"
    volumes:
      - vllm_cache:/root/.cache/huggingface
      - ./:/app
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_TARGET_DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

volumes:
  vllm_cache:
  chroma_data:
  postgres_data:
